name: Daily Market Refresh

on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      phase:
        description: 'fundamentals|summary|all'
        required: false
        default: 'all'

env:
  APP_ENV: production
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate required secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY DART_API_KEY; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub Actions secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Run daily refresh
        run: |
          python backend/scripts/daily_refresh.py --phase ${{ github.event.inputs.phase || 'all' }}
