name: Daily Market Refresh

on:
  schedule:
    - cron: '0,30 * * * 1-5'
  workflow_dispatch:
    inputs:
      phase:
        description: 'scheduled|universe-sync|kr-hot|us-hot|warm-rotate|exact-worker|summary|all'
        required: false
        default: 'scheduled'

env:
  APP_ENV: production
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  DART_API_KEY: ${{ secrets.DART_API_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Validate required secrets
        run: |
          missing=0
          for key in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY DART_API_KEY; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "::error::Missing required GitHub Actions secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Run daily refresh
        run: |
          python backend/scripts/daily_refresh.py --phase ${{ github.event.inputs.phase || 'scheduled' }}
